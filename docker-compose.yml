version: '3.8'

services:
  pdf-to-csv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-to-csv
    ports:
      - "3210:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    networks:
      - pdf-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  pdf-network:
    driver: bridge